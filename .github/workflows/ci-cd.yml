name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repo
      uses: actions/checkout@v4  

    - name: Instalar Node
      uses: actions/setup-node@v4  
      with:
        node-version: '18'

    - name: Instalar dependencias
      run: npm install

    - name: Dar permisos a Jest
      run: chmod +x ./node_modules/.bin/jest

    - name: Ejecutar pruebas
      run: npm test

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/proyecto-final:latest .

    - name: Push Docker
      run: docker push ${{ secrets.DOCKER_USERNAME }}/proyecto-final:latest